title: Ashley Raigosa
description: Computer Science at Stanford — e-portfolio, work experience, and projects.
url: "https://yumibyte.github.io"
baseurl: ""

# Minima 2.5 footer expects `author` as a string and `email` at top level.
author: Ashley Raigosa
email: raigosa@stanford.edu

linkedin_username: ashleyraigosa

# Homepage contact strip (see _includes/contact-strip.html)
contact:
  website_url: "https://www.ashleyraigosa.com"
  website_label: "ashleyraigosa.com"

theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

github_username: yumibyte

# Only these pages appear in the Minima header (not each project page).
header_pages:
  - index.md
  - work.md
  - projects/index.md

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
