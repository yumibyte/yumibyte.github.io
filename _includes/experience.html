<div class="work-list">
{% for job in site.data.experience %}
  <section class="work-card">
    {% if job.logo.src %}
    <div class="work-card__logo">
      <img src="{{ job.logo.src | relative_url }}" alt="{{ job.logo.alt | default: job.company }}" width="120" height="120" loading="lazy" />
    </div>
    {% endif %}
    <div class="work-card__body">
      <h2 class="work-card__role">{{ job.role }}</h2>
      <p class="work-card__company">{{ job.company }}</p>
      <ul>
        {% for bullet in job.bullets %}
        <li>{{ bullet }}</li>
        {% endfor %}
      </ul>
    </div>
  </section>
{% endfor %}
</div>
