{% assign b = site.data.bio %}

<p class="lead home-tagline">{{ b.tagline }}</p>

{% if b.degrees %}
<ul class="degree-list">
  {% for d in b.degrees %}
  <li>{{ d }}</li>
  {% endfor %}
</ul>
{% endif %}

{% for paragraph in b.paragraphs %}
<p>{{ paragraph }}</p>
{% endfor %}

<p>{{ b.hobbies }}</p>

<p>{{ b.intro_footer }}</p>
